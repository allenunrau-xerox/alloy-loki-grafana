if_mib:
  walk:
    - 1.3.6.1.2.1.2        # ifTable - interface stats (in/out octets, errors, status)
    - 1.3.6.1.2.1.31.1.1   # ifXTable - extended interface stats (64-bit counters)
  metrics:
    - name: ifOperStatus
      oid: 1.3.6.1.2.1.2.2.1.8
      type: gauge
      indexes:
        - labelname: ifIndex
          type: Integer32
      lookups:
        - labels: [ifIndex]
          labelname: ifDescr
          oid: 1.3.6.1.2.1.2.2.1.2
          type: DisplayString
    - name: ifInOctets
      oid: 1.3.6.1.2.1.2.2.1.10
      type: counter
      indexes:
        - labelname: ifIndex
          type: Integer32
    - name: ifOutOctets
      oid: 1.3.6.1.2.1.2.2.1.16
      type: counter
      indexes:
        - labelname: ifIndex
          type: Integer32